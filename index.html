<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- The card wrapper uses semantic tags and data-testid attributes for easier testing -->
    <article class="todo-card" data-testid="test-todo-card">
      <header class="card-header">
        <div class="card-header-left">
          <h2 class="todo-title" data-testid="test-todo-title">Build a To‑Do Card</h2>
          <p class="todo-description" data-testid="test-todo-description">
            Implement a responsive and accessible to‑do card component.
          </p>
        </div>
        <div class="card-header-right">
          <!-- Use simple Unicode icons for edit/delete; aria-labels ensure assistive tech can read them -->
          <button
            class="icon-button"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
            type="button"
          >
            ✏️
          </button>
          <button
            class="icon-button"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
            type="button"
          >
            🗑️
          </button>
        </div>
      </header>
      <section class="card-meta">
        <!-- Status and due date information -->
        <!-- Priority badge -->
        <div class="priority-row">
          <span class="label">Priority:</span>
          <span class="value priority-text" data-testid="test-todo-priority">High</span>
        </div>
        <div class="status-row">
          <span class="label">Status:</span>
          <span class="value status-text" data-testid="test-todo-status">In Progress</span>
        </div>
        <div class="due-row">
          <time
            data-testid="test-todo-due-date"
            datetime="2026-02-18T18:00:00Z"
            class="value"
          >
            Due Feb 18 2026 18:00 UTC
          </time>
        </div>
        <div class="remaining-row">
          <span class="label">Time remaining:</span>
          <span id="remaining-time" data-testid="test-todo-time-remaining" class="value" aria-live="polite"
            >Calculating...</span
          >
        </div>
      </section>
      <section class="card-tags" aria-label="Task tags">
        <!-- Tags list: use semantic list structure and required data-testid values -->
        <ul class="tags-list" role="list" data-testid="test-todo-tags">
          <li class="tag tag-work" role="listitem" data-testid="test-todo-tag-work">Work</li>
          <li class="tag tag-urgent" role="listitem" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag tag-design" role="listitem" data-testid="test-todo-tag-design">Design</li>
        </ul>
      </section>
      <section class="card-footer">
        <!-- A native checkbox makes the card state toggleable via keyboard and mouse -->
        <label class="complete-label">
          <input
            type="checkbox"
            id="complete-checkbox"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
          <span>Mark as done</span>
        </label>
      </section>
    </article>
    <script src="script.js"></script>
  </body>
</html>
